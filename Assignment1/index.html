<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pokemon</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.9.0/fonts/remixicon.css" rel="stylesheet"/>
</head>
<body>
    <div class="pokeball-bg"></div>
    <header>
        <img src="./images/pokemon.webp" alt="pokemon-logo">

    <main>
        <section class="hero">
            <div class="hero-content">
                <p>POKEMON GEN I</p>
                <h1>Pikachu</h1>
                <p>Pikachu is an Electric-type Pokémon introduced in Generation I. Pikachu are small, chubby, and incredibly cute mouse-like Pokémon. They are almost completely covered by yellow fur.</p>
                <div class="pagination-text">01 / 08</div>
            </div>
            <div class="hero-image">
                <img src="https://toppng.com/uploads/preview/pokemon-11530983634qehljvhdgi.png" alt="Pikachu">
            </div>
        </section>
        <ul class="pagination-dots">
            <li class="active"></li>
            <li></li>
            <li></li>
            <li></li>
            <li></li>
        </ul>
    </main>
