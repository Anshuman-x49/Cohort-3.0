<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link
      href="https://cdn.jsdelivr.net/npm/remixicon@4.9.0/fonts/remixicon.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="nav">
      <div class="logo">
        <img src="./images/logo.webp" alt="Logo" />
      </div>
      <nav>
        <ul class="nav-links">
          <li>about</li>
          <li class="active">watch now</li>
          <li>actor</li>
          <li>content</li>
        </ul>
      </nav>
      <div class="menu"><i class="ri-menu-line"></i></div>
    </div>
    <div class="hero">
      <div class="hero-content">
        <div class="hero-text">
          <img id="hero-logo" src="./images/logo.webp" alt="hero-logo" />
          <p>
            Action / Thriller / Drama Series directed by Dong-hyuk Hwang<br />Season
            1: 9 Episodes
          </p>
          <div class="buttons">
            <button class="play"><i class="ri-play-fill"></i> play now</button>
            <button class="trailer">
              <i class="ri-play-line"></i>watch trailer
            </button>
          </div>
        </div>
        <div class="hero-img">
          <img src="./images/character.webp" alt="character" />
        </div>
        <div class="watermark">GAME</div>
      </div>
    </div>
    <div class="cards">
      <div class="card">
        <img src="./images/trailer1.webp" alt="scene 1" />
        <div class="play-icon"><i class="ri-play-fill"></i></div>
      </div>

      <div class="card">
        <img src="./images/trailer2.webp" alt="scene 2" />
        <div class="play-icon"><i class="ri-play-fill"></i></div>
      </div>

      <div class="card">
        <img src="./images/trailer3.webp" alt="scene 3" />
        <div class="play-icon"><i class="ri-play-fill"></i></div>
      </div>
    </div>
  </body>
</html>
